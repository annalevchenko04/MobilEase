services:
  backend:
    build: ./backend
    container_name: backend
    env_file: backend/.env
    ports:
      - "8000:8000"
    networks:
      - esp_network

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:80"
    networks:
      - esp_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 5

networks:
  esp_network:
    driver: bridge